            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MaintenancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:Query, dynamodb:UpdateItem]
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SmartLab-ForecastJobs"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SmartLab-ForecastJobs/index/status-startedAt-index"
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${KmsKeyId}"


  GlueRole:
    Type: AWS::IAM::Role
    Properties:

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:ListBucket, s3:DeleteObject]
                Resource:
                  - !Sub "arn:aws:s3:::sl-system-operational-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::sl-system-operational-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::sl-system-analytical-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::sl-system-analytical-${AWS::AccountId}/*"
              - Effect: Allow
                Action: [kms:GenerateDataKey, kms:Decrypt]
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${KmsKeyId}"

  # ══════════════════════════════════════════════════════════
  # CLOUDWATCH LOG GROUPS
  # ══════════════════════════════════════════════════════════
  SmartLabApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/smart-lab-api
      RetentionInDays: 90


  # ══════════════════════════════════════════════════════════
  # WAF — Rate limiting + OWASP protection for REST API
  # ══════════════════════════════════════════════════════════
  SmartLabWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: smart-lab-web-acl
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: SmartLabWebACL
        SampledRequestsEnabled: true
      Rules:
        - Name: RateLimitRule
          Priority: 0
          Action:
            Block: {}
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: SmartLabRateLimit
            SampledRequestsEnabled: true
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
        - Name: AWSManagedCommonRules
          Priority: 1
          OverrideAction:
            None: {}
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: SmartLabCommonRules
            SampledRequestsEnabled: true
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
        - Name: AWSManagedKnownBadInputs
          Priority: 2
          OverrideAction:
            None: {}
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: SmartLabKnownBadInputs
            SampledRequestsEnabled: true
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet

  CommonDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: smart-lab-common-deps
      Description: Common dependencies for all functions
      ContentUri: ../layers/common-deps/
      CompatibleRuntimes:
        - nodejs20.x
    Metadata:
      BuildMethod: nodejs20.x
# ══════════════════════════════════════════════════════════════
# OUTPUTS
# ══════════════════════════════════════════════════════════════
Outputs:
  ApiGatewayUrl:
    Description: REST API endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: SmartLabApiGatewayUrl

  WebSocketUrl:
    Description: WebSocket API endpoint
    Value: !Sub "wss://${SmartLabWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: SmartLabWebSocketUrl

