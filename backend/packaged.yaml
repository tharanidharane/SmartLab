        - GlueRole
        - Arn
      Command:
        Name: glueetl
        ScriptLocation:
          Fn::Sub: s3://${SmartLabAnalyticalBucket}/scripts/etl_job.py
        PythonVersion: '3'
      DefaultArguments:
        --job-bookmark-option: job-bookmark-enable
        --enable-continuous-cloudwatch-log: 'true'
        --enable-job-insights: 'true'
        --TempDir:
          Fn::Sub: s3://${SmartLabAnalyticalBucket}/glue-temp/
