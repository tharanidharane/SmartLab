AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Lab Equipment Booking & Usage Intelligence System
Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173
  AlertEmail:
    Type: String
  KmsKeyId:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  NodeEnv:
    Type: String
    Default: production
Globals:
  Function:
    Runtime: nodejs20.x
    CodeUri: ../dist
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV:
          Ref: NodeEnv
        AWS_ACCOUNT_ID:
          Ref: AWS::AccountId
        DYNAMO_EQUIPMENT_TABLE: SmartLab-Equipment
        DYNAMO_BOOKINGS_TABLE: SmartLab-Bookings
        DYNAMO_USERS_TABLE: SmartLab-Users
        DYNAMO_AUDITLOGS_TABLE: SmartLab-AuditLogs
        DYNAMO_CONNECTIONS_TABLE: SmartLab-WSConnections
        DYNAMO_FORECAST_JOBS_TABLE: SmartLab-ForecastJobs
        DYNAMO_CHAT_SESSIONS_TABLE: SmartLab-ChatSessions
        DYNAMO_USAGE_METRICS_TABLE: SmartLab-UsageMetrics
        S3_OPERATIONAL_BUCKET:
          Fn::Sub: sl-system-operational-${AWS::AccountId}
        S3_ANALYTICAL_BUCKET:
          Fn::Sub: sl-system-analytical-${AWS::AccountId}
        S3_ASSETS_BUCKET:
          Fn::Sub: sl-system-assets-${AWS::AccountId}
        KMS_KEY_ID:
          Ref: KmsKeyId
        COGNITO_USER_POOL_ID:
          Ref: CognitoUserPoolId
        COGNITO_CLIENT_ID:
          Ref: CognitoClientId
        ALLOWED_ORIGIN:
          Ref: AllowedOrigin
        BEDROCK_MODEL_ID: anthropic.claude-3-sonnet-20240229-v1:0
        BEDROCK_TOKEN_CAP_MONTHLY: '100000'
        TOKEN_ESTIMATE_MULTIPLIER: '2'
        ATHENA_DATABASE:
          Fn::Sub: smart_lab_db_${AWS::AccountId}
        ATHENA_WORKGROUP: primary
        ATHENA_RESULTS_BUCKET:
          Fn::Sub: s3://${SmartLabAnalyticalBucket}/athena-results/
        SSM_ROLE_DOMAINS_PATH: /smartlab/role-domains
    Tracing: Active
    Layers:
    - Ref: CommonDepsLayer
    - Fn::Sub: arn:aws:lambda:${AWS::Region}:580247275435:layer:LambdaInsightsExtension:38
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: '''*'''
      AllowHeaders: '''*'''
      AllowOrigin: '''*'''
      AllowCredentials: false
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      AddDefaultAuthorizerToCorsPreflight: false
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn:
            Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
