        - HealthLambdaRole
        - Arn
      Events:
        HttpGet:
          Type: Api
          Properties:
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        WarmupSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"warmup":true}'
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-u5gr3fm4e9bi/f4024fe18167d404fdaec66592a1b6df
